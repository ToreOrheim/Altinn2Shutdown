<!doctype html>
<html lang="en">
  <head>
        <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altinn 2 Shutdown timer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Altinn 2: Important Dates</h1>
    <p class="intro-message">
      <strong>May 31, 2026:</strong> Last day for system integrations and
      reporting in Altinn 2.<br />
      <strong>June 19, 2026:</strong> Altinn 2 service fully shuts down. No
      submissions or integrations allowed after May 31.
    </p>

    <div
      class="countdown-component"
      data-title="Time remaining until shutdown:"
      data-date="2026-06-19T00:00:00Z"
    ></div>

    <div
      class="countdown-component"
      data-title="Time remaining until end of usable period:"
      data-date="2026-05-31T23:59:59Z"
    ></div>

    <template id="countdown-component-template">
      <div class="countdown-container">
        <h1 class="countdown-title"></h1>
        <div class="countdown">
          <div class="time-segment">
            <span class="days">00</span>
            <span class="label">Days</span>
          </div>
          <div class="time-segment">
            <span class="hours">00</span>
            <span class="label">Hours</span>
          </div>
          <div class="time-segment">
            <span class="minutes">00</span>
            <span class="label">Minutes</span>
          </div>
          <div class="time-segment">
            <span class="seconds">00</span>
            <span class="label">Seconds</span>
          </div>
        </div>
      </div>
    </template>
    <script src="script.js"></script>
</body>
</html>
